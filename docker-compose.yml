version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: video_notes_db
    environment:
      POSTGRES_USER: video
      POSTGRES_PASSWORD: video
      POSTGRES_DB: video_notes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: video_notes_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
